from dataclasses import dataclass, field
from datetime import datetime

@dataclass
class ${n}:
    id: int
    name: str
    data: Dict[str, Any] = field(default_factory=dict)
    created_at: datetime = field(default_factory=datetime.utcnow)

class ${n}Service:
    def __init__(self):
        self._store: List[${n}] = []
        self._next_id = 1

    def create(self, name: str, **kwargs) -> ${n}:
        item = ${n}(id=self._next_id, name=name, data=kwargs)
        self._store.append(item)
        self._next_id += 1
        return item

    def get(self, item_id: int) -> Optional[${n}]:
        return next((i for i in self._store if i.id == item_id), None)

    def list_all(self) -> List[${n}]:
        return list(self._store)

    def update(self, item_id: int, **kwargs) -> Optional[${n}]:
        item = self.get(item_id)
        if not item:
            return None
        for k, v in kwargs.items():
            setattr(item, k, v) if hasattr(item, k) else item.data.update({k: v})
        return item

    def delete(self, item_id: int) -> bool:
        before = len(self._store)
        self._store = [i for i in self._store if i.id != item_id]
        return len(self._store) < before`},

from typing import Any, Optional

class ${n}Cache:
    PREFIX = "${n.toLowerCase()}:"
    DEFAULT_TTL = 300

    def __init__(self, host="localhost", port=6379, db=0):
        self.r = redis.Redis(host=host, port=port, db=db, decode_responses=True)

    def _key(self, obj_id) -> str:
        return f"{self.PREFIX}{obj_id}"

    def set(self, obj_id, data: Any, ttl: int = DEFAULT_TTL):
        self.r.setex(self._key(obj_id), ttl, json.dumps(data))

    def get(self, obj_id) -> Optional[Any]:
        raw = self.r.get(self._key(obj_id))
        return json.loads(raw) if raw else None

    def delete(self, obj_id):
        self.r.delete(self._key(obj_id))

    def invalidate_all(self):
        keys = self.r.keys(f"{self.PREFIX}*")
        if keys: self.r.delete(*keys)

    def get_or_fetch(self, obj_id, fetch_fn, ttl: int = DEFAULT_TTL) -> Any:
        cached = self.get(obj_id)

from pathlib import Path
from typing import Any, Dict, List, Callable

class ${n}Transformer:
    def __init__(self):
        self._data: Any = None
        self._pipeline: List[Callable] = []

    def load(self, source):
        if isinstance(source, (str, Path)):
            self._data = json.loads(Path(source).read_text())
        else:
            self._data = source
        return self

    def pipe(self, fn: Callable) -> "${n}Transformer":
        self._pipeline.append(fn)
        return self

    def run(self) -> Any:
        result = self._data
        for fn in self._pipeline:
            result = fn(result)
        return result

    def save(self, path: str, indent=2) -> Path:
        p = Path(path)
        p.write_text(json.dumps(self.run(), indent=indent, ensure_ascii=False))
        return p

def rename_keys(mapping: Dict[str, str]):
    def _fn(data):
        if isinstance(data, list):
            return [{mapping.get(k,k): v for k,v in row.items()} for row in data]
        return {mapping.get(k,k): v for k,v in data.items()}
    return _fn

def filter_records(predicate: Callable):
    return lambda data: [r for r in data if predicate(r)]

if __name__ == "__main__":
    raw = [{"user_id":1,"user_name":"Alice","score":90},
           {"user_id":2,"user_name":"Bob",  "score":45}]
    result = (${n}Transformer()
        .load(raw)
        .pipe(rename_keys({"user_id":"id","user_name":"name"}))
        .pipe(filter_records(lambda r: r["score"] >= 50))
        .run())
    print(json.dumps(result, indent=2))`},

from pathlib import Path
from typing import Any, Dict, List, Optional

class ${n}Store:
    """Thread-safe JSON file-backed key-value store."""

    def __init__(self, filepath: str = "${n.toLowerCase()}_store.json"):
        self._path = Path(filepath)
        self._lock = threading.Lock()
        self._data: Dict[str, Any] = {}
        self._load()

    def _load(self):
        if self._path.exists():
            self._data = json.loads(self._path.read_text())

    def _save(self):
        self._path.write_text(json.dumps(self._data, indent=2, ensure_ascii=False))

    def set(self, key: str, value: Any):
        with self._lock:
            self._data[key] = value; self._save()

    def get(self, key: str, default=None) -> Any:
        return self._data.get(key, default)

    def delete(self, key: str) -> bool:
        with self._lock:
            if key in self._data:
                del self._data[key]; self._save(); return True
        return False

    def list_keys(self) -> List[str]: return list(self._data.keys())
    def all(self) -> Dict[str, Any]: return dict(self._data)
    def clear(self):
        with self._lock: self._data = {}; self._save()

if __name__ == "__main__":
    s = ${n}Store()
    s.set("user:1", {"name":"Alice","role":"admin"})
    print(s.get("user:1")); print(s.list_keys())`},

    def get(self, resource: str, obj_id) -> Dict:
        return self._handle(self.session.get(self._url(f"{resource}/{obj_id}"), timeout=self.timeout))

def verify_sig(payload: bytes, header: str) -> bool:
    expected = hmac.new(WEBHOOK_SECRET.encode(), payload, hashlib.sha256).hexdigest()
    return hmac.compare_digest(expected, header.replace("sha256=", ""))

def on_created(data): print(f"[created] {data}")   # TODO
def on_updated(data): print(f"[updated] {data}")   # TODO

    "${n.toLowerCase()}.created": on_created,
    "${n.toLowerCase()}.updated": on_updated,
    "${n.toLowerCase()}.deleted": on_deleted,
}

@app.route("/webhooks/${n.toLowerCase()}", methods=["POST"])
def webhook():
    sig = request.headers.get("X-Signature-256", "")
    if not verify_sig(request.data, sig):
        return jsonify({"error": "Invalid signature"}), 401
    payload = request.get_json(force=True)
    event   = payload.get("event", "")
    handler = HANDLERS.get(event)
    if handler:
        handler(payload.get("data", {}))
        return jsonify({"status": "handled", "event": event})
    return jsonify({"status": "ignored", "event": event})

from typing import List, Dict

MODEL    = os.getenv("LLM_MODEL",    "claude-sonnet-4-20250514")
API_KEY  = os.getenv("LLM_API_KEY",  "")

def chat(messages: List[Dict], system: str = "", max_tokens: int = 1024) -> str:
    """Send messages and return assistant reply. Swap brain by changing PROVIDER."""
    if PROVIDER == "anthropic": return _anthropic(messages, system, max_tokens)
    if PROVIDER == "openai":    return _openai(messages, system, max_tokens)
    if PROVIDER == "ollama":    return _ollama(messages, system, max_tokens)
    raise ValueError(f"Unknown provider: {PROVIDER}")

def _anthropic(messages, system, max_tokens) -> str:
    payload = {"model": MODEL, "max_tokens": max_tokens, "messages": messages}
    if system: payload["system"] = system
    r = requests.post("https://api.anthropic.com/v1/messages", json=payload,
        headers={"x-api-key": API_KEY, "anthropic-version": "2023-06-01"})
    r.raise_for_status()
    return r.json()["content"][0]["text"]

def _openai(messages, system, max_tokens) -> str:
    msgs = ([{"role":"system","content":system}] if system else []) + messages
    r = requests.post("https://api.openai.com/v1/chat/completions",
        json={"model": MODEL, "messages": msgs, "max_tokens": max_tokens},
        headers={"Authorization": f"Bearer {API_KEY}"})
    r.raise_for_status()
    return r.json()["choices"][0]["message"]["content"]

def _ollama(messages, system, max_tokens) -> str:
    msgs = ([{"role":"system","content":system}] if system else []) + messages
    r = requests.post("http://localhost:11434/api/chat",
        json={"model": MODEL, "messages": msgs, "stream": False})
    r.raise_for_status()
    return r.json()["message"]["content"]

                 system="You are a concise assistant.")

        self._shots: List[Dict] = []
        self._cot = False

    def add_example(self, user: str, assistant: str) -> "${n}PromptBuilder":
        self._shots += [{"role":"user","content":user},
                        {"role":"assistant","content":assistant}]
        return self

    def with_chain_of_thought(self) -> "${n}PromptBuilder":
        self._cot = True; return self

"""
import json, os, requests
from typing import Callable, Dict, List

TOOLS: Dict[str, Callable] = {}

def tool(name: str):
    """Register a Python function as an agent tool."""
    def dec(fn): TOOLS[name] = fn; return fn
    return dec

@tool("calculator")
def calculator(expression: str) -> str:
    try: return str(eval(expression, {"__builtins__": {}}))
    except Exception as e: return f"Error: {e}"

@tool("get_time")
def get_time() -> str:
    from datetime import datetime, timezone
    return datetime.now(timezone.utc).isoformat()

# TODO: add more tools — db lookup, file read, API call, etc.

SYSTEM = """You are ${n}, a helpful agent.
To call a tool respond with ONLY this JSON:
{"tool": "tool_name", "args": {"arg": "value"}}
When done, reply in plain text starting with FINAL:"""

def call_llm(messages: List[Dict]) -> str:
    r = requests.post("https://api.anthropic.com/v1/messages",
        json={"model":"claude-sonnet-4-20250514","max_tokens":1024,
              "system":SYSTEM,"messages":messages},
        headers={"x-api-key": os.getenv("ANTHROPIC_API_KEY",""),
                 "anthropic-version":"2023-06-01"})
    return r.json()["content"][0]["text"]

def run_agent(user_input: str, max_steps: int = 8) -> str:
    messages = [{"role":"user","content":user_input}]
    for _ in range(max_steps):
        reply = call_llm(messages)
        messages.append({"role":"assistant","content":reply})
        if reply.strip().startswith("FINAL:"):
            return reply.replace("FINAL:","").strip()
        try:
            parsed = json.loads(reply.strip())
            fn = TOOLS.get(parsed.get("tool",""))
            args = parsed.get("args", {})
            result = fn(**args) if args else fn()
            messages.append({"role":"user","content":f"Tool result: {result}"})
        except json.JSONDecodeError:
            return reply
    return "Max steps reached."

if __name__ == "__main__":
    print(run_agent("What is 17 * 38? And what time is it now?"))`},

     code:(n)=>`"""
${n} — minimal in-memory vector store.
Plug in any embedding model; no external vector DB needed for small collections.
"""
import json, numpy as np
from typing import List, Dict, Any, Callable, Tuple
from pathlib import Path

class ${n}VectorStore:
    def __init__(self, embed_fn: Callable[[str], List[float]]):
        """
        embed_fn: str -> List[float]
        Example:
            from sentence_transformers import SentenceTransformer
            model = SentenceTransformer("all-MiniLM-L6-v2")
            store = ${n}VectorStore(lambda t: model.encode(t).tolist())
        """
        self.embed_fn = embed_fn
        self._vecs: List[np.ndarray] = []
        self._docs: List[Dict[str, Any]] = []

    def add(self, text: str, metadata: Dict = None):
        self._vecs.append(np.array(self.embed_fn(text), dtype=np.float32))
        self._docs.append({"text": text, "meta": metadata or {}})

    def search(self, query: str, top_k=5) -> List[Tuple[float, Dict]]:
        if not self._vecs: return []
        q = np.array(self.embed_fn(query), dtype=np.float32)
        M = np.stack(self._vecs)
        scores = M @ q / (np.linalg.norm(M, axis=1) * np.linalg.norm(q) + 1e-9)
        idx = np.argsort(scores)[::-1][:top_k]
        return [(float(scores[i]), self._docs[i]) for i in idx]

    def save(self, path: str):
        p = Path(path)
        np.save(p.with_suffix(".npy"), np.stack(self._vecs))
        p.with_suffix(".json").write_text(json.dumps(self._docs, ensure_ascii=False))

    def load(self, path: str):
        p = Path(path)
        self._vecs = list(np.load(p.with_suffix(".npy")))
        self._docs = json.loads(p.with_suffix(".json").read_text())

if __name__ == "__main__":
    import random
    store = ${n}VectorStore(lambda t: [random.random() for _ in range(64)])
    store.add("Python is great for data science", {"tag":"python"})
    store.add("FastAPI makes REST APIs easy",     {"tag":"api"})
    for score, doc in store.search("build an API", top_k=2):
        print(f"{score:.3f}  {doc['text']}")`},

${n} RAG pipeline — Retrieval-Augmented Generation.
Inject your embed_fn and llm_fn; works offline with local models too.
"""
import json, numpy as np
from typing import List, Dict, Callable, Any

class ${n}RAG:
    def __init__(self, embed_fn: Callable[[str], List[float]],
                 llm_fn: Callable[[List[Dict]], str],
                 chunk_size=400, overlap=50):
        self.embed_fn   = embed_fn
        self.llm_fn     = llm_fn
        self.chunk_size = chunk_size
        self.overlap    = overlap
        self._chunks:  List[str]         = []
        self._vectors: List[List[float]] = []
        self._meta:    List[Dict]        = []

    def ingest_text(self, text: str, metadata: Dict = None):
        for chunk in self._chunk(text):
            self._chunks.append(chunk)
            self._vectors.append(self.embed_fn(chunk))
            self._meta.append(metadata or {})

    def ingest_file(self, path: str):
        self.ingest_text(open(path, encoding="utf-8").read(), {"source": path})

    def _chunk(self, text: str) -> List[str]:
        words = text.split()
        chunks, i = [], 0
        while i < len(words):
            chunks.append(" ".join(words[i: i + self.chunk_size]))
            i += self.chunk_size - self.overlap
        return chunks

    def retrieve(self, query: str, top_k=4) -> List[str]:
        if not self._vectors: return []
        q = np.array(self.embed_fn(query))
        M = np.array(self._vectors)
        scores = M @ q / (np.linalg.norm(M, axis=1) * np.linalg.norm(q) + 1e-9)
        return [self._chunks[i] for i in scores.argsort()[::-1][:top_k]]

    def ask(self, question: str, top_k=4,
            system="Answer using only the provided context.") -> str:
        context = "\\n\\n---\\n\\n".join(self.retrieve(question, top_k))
        return self.llm_fn([{"role":"user",
            "content": f"Context:\\n{context}\\n\\nQuestion: {question}"}])

if __name__ == "__main__":
    dummy_embed = lambda t: [hash(w)%100/100 for w in (t.split()+[""]*64)[:64]]
    dummy_llm   = lambda msgs: f"[LLM stub] {msgs[-1]['content'][:60]}..."
    rag = ${n}RAG(embed_fn=dummy_embed, llm_fn=dummy_llm)
    rag.ingest_text("Python is used for AI. FastAPI is fast. SQLAlchemy is an ORM.")
    print(rag.ask("What is SQLAlchemy?"))`},

    {id:'scheduler',icon:'⏱️',name:'Task Scheduler',deps:'stdlib',
     code:(n)=>`import threading, time
from datetime import datetime
from typing import Callable, List

class ${n}Task:
    def __init__(self, name, fn, interval):
        self.name=name; self.fn=fn; self.interval=interval
        self.last_run=None; self.run_count=0

class ${n}Scheduler:
    def __init__(self):
        self._tasks: List[${n}Task] = []
        self._running = False

    def add_task(self, name: str, fn: Callable, interval_sec: float):
        self._tasks.append(${n}Task(name, fn, interval_sec))

    def _loop(self):
        while self._running:
            now = datetime.utcnow()
            for t in self._tasks:
                if t.last_run is None or (now-t.last_run).total_seconds() >= t.interval:
                    try: t.fn(); t.last_run=now; t.run_count+=1
                    except Exception as e: print(f"[{t.name}] error: {e}")
            time.sleep(0.5)

    def start(self):
        self._running=True
        threading.Thread(target=self._loop, daemon=True).start()

    def stop(self): self._running=False`},
    {id:'config',icon:'⚙️',name:'Config Loader',deps:'stdlib',
     code:(n)=>`import os, json
from pathlib import Path
from dataclasses import dataclass, field, asdict
from typing import Any, Dict

@dataclass
class ${n}Config:
    app_name:     str  = "${n}"
    debug:        bool = False
    port:         int  = 8000
    database_url: str  = "sqlite:///app.db"
    secret_key:   str  = "change-me"
    extra: Dict[str, Any] = field(default_factory=dict)

class ${n}ConfigLoader:
    PREFIX = "${n.toUpperCase()}_"
    def __init__(self, path="config.json"):
        self.path = Path(path)
        self.config = ${n}Config()

    def load(self) -> ${n}Config:
        if self.path.exists():
            for k, v in json.loads(self.path.read_text()).items():
                setattr(self.config, k, v) if hasattr(self.config, k) else self.config.extra.update({k:v})
        for env, (attr, typ) in {
            f"{self.PREFIX}DEBUG":        ("debug", lambda x: x.lower()=="true"),
            f"{self.PREFIX}PORT":         ("port", int),
            f"{self.PREFIX}DATABASE_URL": ("database_url", str),
        }.items():
            val = os.getenv(env)
            if val: setattr(self.config, attr, typ(val))
        return self.config

    def save(self):
        self.path.write_text(json.dumps(asdict(self.config), indent=2))`},
  ],
};

let currentCat = 'ai';
let selectedTpl = null;

function renderSidebar(){
  const sidebar = document.getElementById('sidebar');
  const groups = [
    {label:'Web & Services', ids:['backend','api']},
    {label:'Data & Storage',  ids:['database','json']},
    {label:'Interfaces',      ids:['frontend']},
    {label:'AI / LLM',        ids:['ai']},
    {label:'Helpers',         ids:['utils']},
  ];
  sidebar.innerHTML = groups.map(g => `
    <div class="sidebar-section">
      <div class="sidebar-section-label">${g.label}</div>
      ${g.ids.map(id => {
        const cat = CATS.find(c=>c.id===id);
        const count = TEMPLATES[id].length;
        return `<button class="cat-btn ${id===currentCat?'active':''}" onclick="setCat('${id}')">
          <span class="cat-dot" style="background:${cat.dot}"></span>
          ${cat.label}
          <span style="margin-left:auto;font-size:10px;opacity:.6">${count}</span>
        </button>`;
      }).join('')}
    </div>`).join('');
}

function setCat(id){
  currentCat=id; selectedTpl=null;
  const cat=CATS.find(c=>c.id===id);
  document.getElementById('cat-title').textContent=cat.label;
  renderSidebar(); renderTemplates();
  document.getElementById('code-panel').innerHTML=
    '<div class="placeholder">Select a template to generate a Python skeleton</div>';
}

function renderTemplates(){
  const cat=CATS.find(c=>c.id===currentCat);
  document.getElementById('tpl-grid').innerHTML = TEMPLATES[currentCat].map(t=>`
    <button class="tpl-card ${selectedTpl===t.id?'selected':''}" onclick="selectTpl('${t.id}')"
      style="${selectedTpl===t.id?`border-color:${cat.color};background:${cat.bg}`:''}">
      <span class="tpl-icon">${t.icon}</span>
      <span class="tpl-name">${t.name}</span>
      <span class="tpl-deps ${t.deps==='stdlib'?'stdlib':''}">${t.deps==='stdlib'?'stdlib only':'pip: '+t.deps}</span>
    </button>`).join('');
}

function selectTpl(id){ selectedTpl=id; renderTemplates(); renderCode(); }
function regenerate(){ if(selectedTpl) renderCode(); }

function renderCode(){
  const tpl=TEMPLATES[currentCat].find(t=>t.id===selectedTpl);
  if(!tpl) return;
  const raw=(document.getElementById('customName').value||'MyApp').trim();
  const n=raw.replace(/[^a-zA-Z0-9_]/g,'_');
  const Name=n.charAt(0).toUpperCase()+n.slice(1);
  const code=tpl.code(Name);
  const cat=CATS.find(c=>c.id===currentCat);
  const lines=code.split('\n').length;
  const isStdlib=tpl.deps==='stdlib';

  document.getElementById('code-panel').innerHTML=`
    <div class="code-topbar">
      <span class="code-title">${tpl.icon} ${tpl.name} &mdash; ${Name}</span>
      <span class="code-dep-badge" style="color:${cat.color};border-color:${cat.color};background:${cat.bg}">
        ${isStdlib?'no installs':'pip install '+tpl.deps}
      </span>
      <span class="code-meta">${lines} lines</span>
      <button class="copy-btn" id="cbtn" onclick="copyCode()">Copy</button>
    </div>
    <pre id="code-out">${esc(code)}</pre>`;
}

function copyCode(){
  const code=document.getElementById('code-out').innerText;
  navigator.clipboard.writeText(code).then(()=>{
    const b=document.getElementById('cbtn');
    b.textContent='Copied!'; b.classList.add('copied');
    setTimeout(()=>{b.textContent='Copy';b.classList.remove('copied');},1500);
  });
}

function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

renderSidebar(); renderTemplates();
</script>
</body>
</html>
